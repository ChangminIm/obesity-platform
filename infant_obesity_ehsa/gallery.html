<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결과지도 다운로드 · 영유아 소아비만 EHSA</title>
<style>
:root{
  --kk-green:#036b3f; --kk-green-dark:#024e2e; --kk-green-light:#0a8c52; --kk-accent:#00a86b;
  --ink:#1f2937; --muted:#6b7280; --bg:#f4f7f5; --card:#ffffff; --border:#e5e9e7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
a{color:inherit}

header.top{background:var(--kk-green);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header.top h1{font-size:18px;margin:0;font-weight:700}
header.top .sub{font-size:12.5px;opacity:.9}
header.top .links{margin-left:auto;display:flex;gap:8px}
header.top a.nav{color:#fff;text-decoration:none;font-size:13px;border:1px solid rgba(255,255,255,.5);padding:6px 12px;border-radius:7px}
header.top a.nav:hover{background:rgba(255,255,255,.15)}

.wrap{max-width:1180px;margin:0 auto;padding:8px 24px 56px}
.intro{font-size:13.5px;color:var(--muted);margin:22px 0 4px;max-width:880px;line-height:1.6}

.section-title{font-size:19px;font-weight:700;margin:38px 0 6px;display:flex;align-items:center;gap:8px}
.section-title .cnt{font-size:13px;font-weight:500;color:var(--muted)}
.section-desc{font-size:12.5px;color:var(--muted);margin-bottom:16px}

.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.result-card .thumb{display:block;background:#f6f7f5;border-bottom:1px solid var(--border);overflow:hidden}
.result-card .thumb img{width:100%;height:auto;display:block;transition:transform .2s}
.result-card .thumb:hover img{transform:scale(1.02)}
.result-card .body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
.result-card .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;background:#e8f5ee;color:var(--kk-green);margin-bottom:10px;align-self:flex-start}
.result-card h3{font-size:15.5px;font-weight:700;margin-bottom:4px}
.result-card .meta{font-size:11.5px;color:var(--muted);margin-bottom:10px}
.result-card .desc{font-size:12.5px;color:#4b5563;line-height:1.45;flex:1;margin-bottom:14px}
.result-card .dl{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;background:#e8f5ee;color:var(--kk-green);border:1px solid #cde8d8;padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none}
.result-card .dl:hover{background:var(--kk-green);color:#fff;border-color:var(--kk-green)}

.soon{border:1.5px dashed var(--border);border-radius:14px;padding:26px 22px;background:#fbfcfb;color:var(--muted);font-size:13px;line-height:1.6}
.soon b{color:var(--kk-green-dark)}

footer{text-align:center;color:var(--muted);font-size:12.5px;padding:28px 24px 40px;border-top:1px solid var(--border)}
footer .credit{margin-top:8px;font-weight:600;color:var(--kk-green)}
</style>
</head>
<body>
<header class="top">
  <div>
    <h1>결과지도 다운로드</h1>
    <div class="sub">전국 시군구 영유아 소아비만 EHSA · 권역별 정지도(PNG)</div>
  </div>
  <div class="links">
    <a class="nav" href="index.html">← 인터랙티브 지도</a>
    <a class="nav" href="../index.html">메인으로</a>
  </div>
</header>

<div class="wrap">
  <div class="intro">
    ArcGIS EHSA 방식(공간시간 Getis-Ord Gi*, 섬연결 가중, FDR 보정)으로 산출한 권역별 정지도입니다.
    심볼은 ESRI EHSA 표준(v2)을 따릅니다. 썸네일을 클릭하면 원본이 새 탭으로 열리고, 버튼으로 PNG를 내려받을 수 있습니다.
  </div>
  <div id="sections"></div>
</div>

<footer>GIS 기반 소아비만 종합 분석 플랫폼 · 데이터 기준 2026<div class="credit">made by 국립공주대학교 임창민</div></footer>

<script>
// 새 지도(개별 연도별 Gi* 등)는 해당 그룹의 items 배열에 객체만 추가하면 카드가 자동 생성됩니다.
const SECTIONS=[
  {
    title:'권역별 EHSA 종합도', icon:'🗺️',
    desc:'비만율 · 과체중이상율 · 비만 아동수(규모) 3개 지표의 EHSA 패턴을 한 장에 담은 종합도입니다.',
    items:[
      {file:'region_national_ehsa.png', tag:'전국', name:'전국 EHSA 종합도', size:'360 KB',
       desc:'전국 기준 시군구 EHSA(비만율·과체중이상율·비만 아동수) 3패널 종합도.'},
      {file:'region_chungcheong_ehsa.png', tag:'충청권', name:'충청권 EHSA 종합도', size:'216 KB',
       desc:'충청권 내 비교 기준 시군구 EHSA 3패널 종합도.'},
      {file:'region_gyeongsang_ehsa.png', tag:'경상권', name:'경상권 EHSA 종합도', size:'219 KB',
       desc:'경상권 내 비교 기준 시군구 EHSA 3패널 종합도.'},
      {file:'region_jeolla_ehsa.png', tag:'전라권', name:'전라권 EHSA 종합도', size:'392 KB',
       desc:'전라권 내 비교 기준 시군구 EHSA 3패널 종합도(내부가 균질해 No Pattern 다수).'}
    ]
  },
  {
    title:'연도별 Gi* (공간시간) 패널', icon:'📈',
    desc:'2012–2024 연도별 Getis-Ord Gi* z-score를 연도 패널로 펼친 공간시간 지도입니다.',
    items:[
      {file:'region_gyeongsang_giyear.png', tag:'경상권', name:'경상권 연도별 Gi* (비만율)', size:'308 KB',
       desc:'2012–2024 연도별 비만율 Gi* z (space-time) 패널.'},
      {file:'region_jeolla_giyear.png', tag:'전라권', name:'전라권 연도별 Gi* (비만율)', size:'503 KB',
       desc:'2012–2024 연도별 비만율 Gi* z (space-time) 패널.'}
    ]
  },
  {
    title:'개별 연도별 Gi* 지도', icon:'🧭', soon:true,
    desc:'권역·연도별 개별 Getis-Ord Gi* 지도를 곧 추가합니다.',
    soonText:'준비 중 — 권역별 · 연도별(2012–2024) 개별 Gi* 지도가 이 섹션에 추가될 예정입니다.'
  }
];

const root=document.getElementById('sections');
SECTIONS.forEach(s=>{
  const n=s.items?s.items.length:0;
  let h='<div class="section-title">'+s.icon+' '+s.title+(n?' <span class="cnt">· '+n+'종</span>':'')+'</div>';
  if(s.desc)h+='<div class="section-desc">'+s.desc+'</div>';
  if(s.soon){
    h+='<div class="soon"><b>곧 추가</b> · '+s.soonText+'</div>';
  }else{
    h+='<div class="results">'+s.items.map(it=>{
      const dlname=it.name.replace(/[ ·()]+/g,'_')+'.png';
      return '<div class="result-card">'+
        '<a class="thumb" href="assets/'+it.file+'" target="_blank" rel="noopener"><img src="assets/'+it.file+'" alt="'+it.name+'" loading="lazy"></a>'+
        '<div class="body"><span class="tag">'+it.tag+'</span>'+
        '<h3>'+it.name+'</h3>'+
        '<div class="meta">'+it.size+' · 클릭 시 원본</div>'+
        '<div class="desc">'+it.desc+'</div>'+
        '<a class="dl" href="assets/'+it.file+'" download="'+dlname+'">⬇ PNG 다운로드</a>'+
        '</div></div>';
    }).join('')+'</div>';
  }
  root.insertAdjacentHTML('beforeend',h);
});
</script>
</body>
</html>
