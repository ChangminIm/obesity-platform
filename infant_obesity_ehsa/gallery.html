<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결과지도 갤러리 · 영유아 소아비만 EHSA</title>
<style>
:root{
  --kk-green:#036b3f; --kk-green-dark:#024e2e; --kk-green-light:#0a8c52; --kk-accent:#00a86b;
  --ink:#1f2937; --muted:#6b7280; --bg:#f4f7f5; --card:#ffffff; --border:#e5e9e7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
a{color:inherit}

header.top{background:var(--kk-green);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header.top h1{font-size:18px;margin:0;font-weight:700}
header.top .sub{font-size:12.5px;opacity:.9}
header.top .links{margin-left:auto;display:flex;gap:8px}
header.top a.nav{color:#fff;text-decoration:none;font-size:13px;border:1px solid rgba(255,255,255,.5);padding:6px 12px;border-radius:7px}
header.top a.nav:hover{background:rgba(255,255,255,.15)}

.wrap{max-width:1180px;margin:0 auto;padding:8px 24px 56px}
.intro{font-size:13px;color:var(--muted);margin:18px 0 0;line-height:1.7}

/* 필터바 */
.filters{display:flex;flex-direction:column;gap:10px;margin:16px 0 6px;padding:16px 18px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 14px rgba(3,107,63,.05)}
.frow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.flab{font-size:12px;font-weight:700;color:var(--kk-green-dark);width:44px;flex-shrink:0}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-wrap:wrap}
.seg button{padding:8px 15px;border:0;background:#fff;font-size:13px;cursor:pointer;border-right:1px solid var(--border);color:var(--ink)}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--kk-green);color:#fff;font-weight:700}
.seg button.disabled{opacity:.32;pointer-events:none}
.filters select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--ink);cursor:pointer;min-width:180px}
.filters select:hover{border-color:var(--kk-green)}
.rescount{font-size:12.5px;color:var(--muted);margin:12px 2px 14px}

.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.result-card .thumb{display:block;background:#f6f7f5;border-bottom:1px solid var(--border);overflow:hidden}
.result-card .thumb img{width:100%;height:auto;display:block;transition:transform .2s}
.result-card .thumb:hover img{transform:scale(1.02)}
.result-card .body{padding:15px 16px 16px;display:flex;flex-direction:column;flex:1}
.result-card .tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;background:#e8f5ee;color:var(--kk-green);margin-bottom:9px;align-self:flex-start}
.result-card h3{font-size:15px;font-weight:700;margin-bottom:3px}
.result-card .meta{font-size:11.5px;color:var(--muted);margin-bottom:12px;flex:1}
.result-card .dls{display:flex;gap:8px;flex-wrap:wrap}
.result-card .dl{display:inline-flex;align-items:center;gap:6px;background:#e8f5ee;color:var(--kk-green);border:1px solid #cde8d8;padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none}
.result-card .dl:hover{background:var(--kk-green);color:#fff;border-color:var(--kk-green)}
.empty{color:var(--muted);font-size:13px;padding:30px 4px}

footer{text-align:center;color:var(--muted);font-size:12.5px;padding:28px 24px 40px;border-top:1px solid var(--border)}
footer .credit{margin-top:8px;font-weight:600;color:var(--kk-green)}
</style>
</head>
<body>
<header class="top">
  <div>
    <h1>결과지도 갤러리</h1>
    <div class="sub">전국 영유아 소아비만 공간분석 · 분석 · 지표 · 권역별 정지도</div>
  </div>
  <div class="links">
    <a class="nav" href="index.html">← 인터랙티브 지도</a>
    <a class="nav" href="../index.html">메인으로</a>
  </div>
</header>

<div class="wrap">
  <div class="intro">
    - 분석(EHSA · 연도별 Gi*) · 지표(비만율 · 과체중이상율 · 비만 아동수) · 권역을 골라 탐색<br>
    - ArcGIS EHSA 방식(공간시간 Getis-Ord Gi*, 섬연결 가중, FDR 보정) 산출, ESRI EHSA 표준 심볼<br>
    - 썸네일 클릭 시 원본 새 탭, 버튼으로 PNG·GIF 다운로드
  </div>

  <div class="filters">
    <div class="frow"><span class="flab">분석</span>
      <div class="seg" id="fAnalysis">
        <button data-v="ehsa" class="on">EHSA (발생 핫스팟)</button>
        <button data-v="giyear">연도별 Gi* (공간시간)</button>
      </div>
    </div>
    <div class="frow"><span class="flab">지표</span>
      <div class="seg" id="fInd">
        <button data-v="" class="on">비만율</button>
        <button data-v="overweight">과체중이상율</button>
        <button data-v="count">비만 아동수</button>
        <button data-v="compare">3지표 비교</button>
      </div>
    </div>
    <div class="frow"><span class="flab">권역</span>
      <select id="fRegion"></select>
    </div>
  </div>

  <div class="rescount" id="rescount"></div>
  <div class="results" id="grid"></div>
</div>

<footer>GIS 기반 소아비만 종합 분석 플랫폼 · 데이터 기준 2026<div class="credit">made by 국립공주대학교 임창민</div></footer>

<script>
const BASE='assets/infant_obesity_maps/';
const REGIONS=[
  {key:'national',  ko:'전국',   grp:'전국'},
  {key:'capital',   ko:'수도권', grp:'수도권'},
  {key:'seoul',     ko:'서울',   grp:'수도권'},
  {key:'chungcheong',ko:'충청권',grp:'충청'},
  {key:'chungbuk',  ko:'충북',   grp:'충청'},
  {key:'chungnam',  ko:'충남',   grp:'충청'},
  {key:'jeolla',    ko:'전라권', grp:'전라'},
  {key:'jeonbuk',   ko:'전북',   grp:'전라'},
  {key:'jeonnam',   ko:'전남',   grp:'전라'},
  {key:'gyeongsang',ko:'경상권', grp:'경상'},
  {key:'gyeongbuk', ko:'경북',   grp:'경상'},
  {key:'gyeongnam', ko:'경남',   grp:'경상'},
  {key:'gangwon',   ko:'강원',   grp:'강원·제주'},
  {key:'jeju',      ko:'제주',   grp:'강원·제주'}
];
const GRP_ORDER=['수도권','충청','전라','경상','강원·제주'];
const TOK={'':'','overweight':'overweight_','count':'count_'};
const IND_KO={'':'비만율','overweight':'과체중이상율','count':'비만 아동수','compare':'3지표 비교'};

const state={analysis:'ehsa',ind:'',region:'all'};

// 권역 드롭다운
(function(){
  let h='<option value="all">전체 권역</option><option value="national">전국</option>';
  GRP_ORDER.forEach(g=>{
    const rs=REGIONS.filter(r=>r.grp===g);
    h+='<optgroup label="'+g+'">'+rs.map(r=>'<option value="'+r.key+'">'+r.ko+'</option>').join('')+'</optgroup>';
  });
  document.getElementById('fRegion').innerHTML=h;
})();

function fileFor(analysis,ind,region){
  if(analysis==='ehsa'){
    if(ind==='compare') return {png:'ehsa_result/region_'+region+'_ehsa_compare.png'};
    return {png:'ehsa_result/region_'+region+'_'+TOK[ind]+'ehsa.png'};
  }
  const t=TOK[ind];
  return {png:'hotspot_result_by_year/region_'+region+'_'+t+'giyear.png',
          gif:'hotspot_result_by_year/region_'+region+'_'+t+'giyear.gif'};
}
function cardHTML(r){
  const f=fileFor(state.analysis,state.ind,r.key);
  const aKo=state.analysis==='ehsa'?'EHSA':'연도별 Gi*';
  const indKo=IND_KO[state.ind];
  const png=BASE+f.png;
  const dlbase=('region_'+r.key+'_'+state.ind+'_'+state.analysis).replace(/_+/g,'_');
  const meta=state.analysis==='giyear'
      ? '2012–2024 연도별 Gi* z 패널 · PNG/GIF'
      : (state.ind==='compare'?'3지표(비만율·과체중이상율·비만 아동수) EHSA 비교도':'EHSA 패턴 (발생 핫스팟 분석)');
  let dls='<a class="dl" href="'+png+'" download="'+dlbase+'.png">⬇ PNG</a>';
  if(f.gif) dls+='<a class="dl" href="'+BASE+f.gif+'" download="'+dlbase+'.gif">⬇ GIF</a>';
  return '<div class="result-card">'+
    '<a class="thumb" href="'+png+'" target="_blank" rel="noopener"><img src="'+png+'" alt="'+r.ko+' '+indKo+' '+aKo+'" loading="lazy"></a>'+
    '<div class="body"><span class="tag">'+r.ko+'</span>'+
    '<h3>'+indKo+' · '+aKo+'</h3>'+
    '<div class="meta">'+meta+'</div>'+
    '<div class="dls">'+dls+'</div>'+
    '</div></div>';
}
function render(){
  const regions=state.region==='all'?REGIONS:REGIONS.filter(r=>r.key===state.region);
  const cards=regions.map(cardHTML);
  const grid=document.getElementById('grid');
  grid.innerHTML=cards.length?cards.join(''):'<div class="empty">해당 조건의 지도가 없습니다.</div>';
  document.getElementById('rescount').textContent=cards.length+'종';
}
function setSeg(id,val){
  document.querySelectorAll('#'+id+' button').forEach(b=>b.classList.toggle('on',b.dataset.v===val));
}
function syncCompare(){
  const btn=document.querySelector('#fInd [data-v="compare"]');
  if(state.analysis!=='ehsa'){
    btn.classList.add('disabled');
    if(state.ind==='compare'){state.ind='';setSeg('fInd','');}
  } else btn.classList.remove('disabled');
}
document.querySelectorAll('#fAnalysis button').forEach(b=>b.onclick=()=>{
  state.analysis=b.dataset.v;setSeg('fAnalysis',state.analysis);syncCompare();render();});
document.querySelectorAll('#fInd button').forEach(b=>b.onclick=()=>{
  if(b.classList.contains('disabled'))return;
  state.ind=b.dataset.v;setSeg('fInd',state.ind);render();});
document.getElementById('fRegion').onchange=e=>{state.region=e.target.value;render();};

syncCompare();render();
</script>
</body>
</html>
